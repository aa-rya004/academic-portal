<script>
function updateCourses() {
    let category = document.getElementById("category").value;
    let course = document.getElementById("course");

    course.innerHTML = "<option>--Select Course--</option>";

    let options = [];

    if (category === "cs") {
        options = ["Web Development", "Data Structures"];
    } 
    else if (category === "business") {
        options = ["Marketing", "Finance"];
    } 
    else if (category === "engineering") {
        options = ["Mechanical", "Civil"];
    }

    options.forEach(function(item) {
        let opt = document.createElement("option");
        opt.value = item;
        opt.text = item;
        course.appendChild(opt);
    });
}

function showResources() {
    let course = document.getElementById("course").value;
    let container = document.getElementById("resourcesList");

    container.innerHTML = "";

    let resources = [];

    if (course === "Web Development") {
        resources = [
            {name: "W3Schools", link: "https://www.w3schools.com"},
            {name: "MDN Docs", link: "https://developer.mozilla.org"}
        ];
    }
    else if (course === "Data Structures") {
        resources = [
            {name: "GeeksforGeeks", link: "https://www.geeksforgeeks.org"},
            {name: "LeetCode", link: "https://leetcode.com"}
        ];
    }
    else if (course === "Marketing") {
        resources = [
            {name: "HubSpot", link: "https://www.hubspot.com"}
        ];
    }
    else if (course === "Finance") {
        resources = [
            {name: "Investopedia", link: "https://www.investopedia.com"}
        ];
    }
    else if (course === "Mechanical") {
        resources = [
            {name: "Engineering Toolbox", link: "https://www.engineeringtoolbox.com"}
        ];
    }
    else if (course === "Civil") {
        resources = [
            {name: "Civil Engineering Portal", link: "https://www.engineeringcivil.com"},
            {name: "The Constructor", link: "https://theconstructor.org"}
        ];
    }

    resources.forEach(function(item) {
        let div = document.createElement("div");
        div.className = "resource-box";

        div.innerHTML = `
            <a href="${item.link}" target="_blank">${item.name}</a>
        `;

        container.appendChild(div);
    });
}
</script>
