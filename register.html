<script>
// Dynamic course update
function updateCourses() {
    let category = document.getElementById("category").value;
    let course = document.getElementById("course");

    course.innerHTML = ""; // clear previous options

    let options = [];

    if (category === "cs") {
        options = ["Web Development", "Data Structures", "Artificial Intelligence"];
    } 
    else if (category === "business") {
        options = ["Marketing", "Finance", "Human Resource"];
    } 
    else if (category === "engineering") {
        options = ["Mechanical", "Civil", "Electrical"];
    }

    options.forEach(function(item) {
        let opt = document.createElement("option");
        opt.value = item;
        opt.text = item;
        course.appendChild(opt);
    });
}

// Validation
function validateForm() {
    let name = document.forms["regForm"]["name"].value;
    let email = document.forms["regForm"]["email"].value;

    if (name === "" || email === "") {
        alert("All fields are required!");
        return false;
    }

    let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
    if (!email.match(emailPattern)) {
        alert("Enter valid email!");
        return false;
    }

    alert("🎉 Registration Successful!");
    return true;
}
</script>
